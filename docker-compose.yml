version: "3.9"

services:
  cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: mysql:8.0-oracle
    restart: unless-stopped

    # Do NOT expose MySQL publicly on a VPS (even for testing)
    # ports:
    #   - "3306:3306"

    volumes:
      - "./docker/database/:/docker-entrypoint-initdb.d/"
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: "fleetbase"
      MYSQL_USER: "fleetbase"
      MYSQL_PASSWORD: "fleetbase123"
      MYSQL_ROOT_PASSWORD: "root123"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  socket:
    image: socketcluster/socketcluster:v17.4.0
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "38000:8000"
    environment:
      SOCKETCLUSTER_WORKERS: 10
      SOCKETCLUSTER_BROKERS: 10
      SOCKETCLUSTER_OPTIONS: >-
        {"origins":"http://46.202.175.218:*"}

  scheduler:
    image: fleetbase/fleetbase-api:latest
    restart: unless-stopped
    command: ["go-crond", "--verbose", "root:./crontab"]
    environment:
      DATABASE_URL: "mysql://fleetbase:fleetbase123@database:3306/fleetbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: "redis://cache:6379"
      REDIS_URL: "redis://cache:6379"
    volumes:
      - api_storage:/fleetbase/api/storage
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy

  queue:
    image: fleetbase/fleetbase-api:latest
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120"]
    environment:
      DATABASE_URL: "mysql://fleetbase:fleetbase123@database:3306/fleetbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: "redis://cache:6379"
      REDIS_URL: "redis://cache:6379"
    volumes:
      - api_storage:/fleetbase/api/storage
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy

  application:
    image: fleetbase/fleetbase-api:latest
    restart: unless-stopped
    volumes:
      - api_storage:/fleetbase/api/storage
    environment:
      ENVIRONMENT: production
      APP_ENV: production
      APP_DEBUG: "false"

      # Laravel/Fleetbase needs an APP_KEY - this avoids common boot failures
      APP_KEY: "base64:ZmFrZS1rZXktZm9yLXRlc3Rpbmctb25seS0xMjM0NTY3ODkwMTIzNDU2"

      APP_URL: "http://46.202.175.218:8000"
      CONSOLE_HOST: "http://46.202.175.218:4200"

      # IP hosting: do NOT set cookies to an IP domain
      SESSION_DOMAIN: ""

      DATABASE_URL: "mysql://fleetbase:fleetbase123@database:3306/fleetbase"

      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: "redis://cache:6379"
      REDIS_URL: "redis://cache:6379"

      BROADCAST_DRIVER: socketcluster

      MAIL_FROM_NAME: Fleetbase
      APP_NAME: Fleetbase
      LOG_CHANNEL: daily

      REGISTRY_HOST: https://registry.fleetbase.io
      REGISTRY_PREINSTALLED_EXTENSIONS: "true"
      OSRM_HOST: https://router.project-osrm.org
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      queue:
        condition: service_started
      socket:
        condition: service_started

  httpd:
    build:
      context: .
      dockerfile: docker/httpd/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - application

  # FIXED: no bind-mount fleetbase.config.json (prevents your mount error)
  # Writes config inside container then starts nginx.
  console:
    image: fleetbase/fleetbase-console:latest
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      FLEETBASE_API: "http://46.202.175.218:8000"
      FLEETBASE_SOCKET: "ws://46.202.175.218:38000"
    command:
      - /bin/sh
      - -lc
      - |
        cat > /usr/share/nginx/html/fleetbase.config.json <<EOF
        {
          "api": "${FLEETBASE_API}",
          "socket": "${FLEETBASE_SOCKET}"
        }
        EOF
        exec nginx -g "daemon off;"
    depends_on:
      - httpd
      - socket

volumes:
  mysql_data:
  redis_data:
  api_storage:
