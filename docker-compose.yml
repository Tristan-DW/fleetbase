version: "3.9"

services:
  cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: mysql:8.0-oracle
    restart: unless-stopped

    # IMPORTANT: do NOT expose MySQL publicly on a VPS
    # If you absolutely must connect remotely, do it via SSH tunnel instead.
    # ports:
    #   - "3306:3306"

    volumes:
      - "./docker/database/:/docker-entrypoint-initdb.d/"
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: "fleetbase"
      MYSQL_USER: "fleetbase"
      MYSQL_PASSWORD: "CHANGE_ME_STRONG_DB_PASSWORD"
      MYSQL_ROOT_PASSWORD: "CHANGE_ME_STRONG_ROOT_PASSWORD"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  socket:
    image: socketcluster/socketcluster:v17.4.0
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "38000:8000"
    environment:
      SOCKETCLUSTER_WORKERS: 10
      SOCKETCLUSTER_BROKERS: 10
      # Allow console + api to connect (for now using your IP)
      SOCKETCLUSTER_OPTIONS: >-
        {"origins":"http://46.202.175.218:*"}

  scheduler:
    image: fleetbase/fleetbase-api:latest
    command: ["go-crond", "--verbose", "root:./crontab"]
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://fleetbase:CHANGE_ME_STRONG_DB_PASSWORD@database:3306/fleetbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: "redis://cache:6379"
      REDIS_URL: "redis://cache:6379"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy

  queue:
    image: fleetbase/fleetbase-api:latest
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120"]
    restart: unless-stopped
    environment:
      DATABASE_URL: "mysql://fleetbase:CHANGE_ME_STRONG_DB_PASSWORD@database:3306/fleetbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: "redis://cache:6379"
      REDIS_URL: "redis://cache:6379"
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy

  console:
    image: fleetbase/fleetbase-console:latest
    restart: unless-stopped
    ports:
      - "4200:4200"
    volumes:
      - ./console/fleetbase.config.json:/usr/share/nginx/html/fleetbase.config.json:ro
    depends_on:
      - httpd
      - socket

  application:
    image: fleetbase/fleetbase-api:latest
    restart: unless-stopped
    volumes:
      - ./api/.env:/fleetbase/api/.env
    environment:
      # Switch off "development" on VPS
      ENVIRONMENT: production
      APP_ENV: production
      APP_DEBUG: "false"

      # IMPORTANT: these must match how you access the VPS
      APP_URL: "http://46.202.175.218:8000"
      CONSOLE_HOST: "http://46.202.175.218:4200"

      # If you later move to real domains, change this to ".yourdomain.com"
      SESSION_DOMAIN: "46.202.175.218"

      DATABASE_URL: "mysql://fleetbase:CHANGE_ME_STRONG_DB_PASSWORD@database:3306/fleetbase"
      QUEUE_CONNECTION: redis
      CACHE_DRIVER: redis
      CACHE_PATH: /fleetbase/api/storage/framework/cache
      CACHE_URL: "redis://cache:6379"
      REDIS_URL: "redis://cache:6379"

      BROADCAST_DRIVER: socketcluster

      MAIL_FROM_NAME: Fleetbase
      APP_NAME: Fleetbase
      LOG_CHANNEL: daily

      REGISTRY_HOST: https://registry.fleetbase.io
      REGISTRY_PREINSTALLED_EXTENSIONS: "true"
      OSRM_HOST: https://router.project-osrm.org
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      queue:
        condition: service_started
      socket:
        condition: service_started

  httpd:
    build:
      context: .
      dockerfile: docker/httpd/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - application

volumes:
  mysql_data:
  redis_data:
