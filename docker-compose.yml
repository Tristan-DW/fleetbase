version: "3.9"

services:
  cache:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  database:
    image: mysql:8.0-oracle
    restart: unless-stopped
    volumes:
      - "./docker/database/:/docker-entrypoint-initdb.d/"
      - mysql_data:/var/lib/mysql
    environment:
      MYSQL_DATABASE: "fleetbase"
      MYSQL_USER: "fleetbase"
      MYSQL_PASSWORD: "fleetbase123"
      MYSQL_ROOT_PASSWORD: "root123"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  socket:
    image: socketcluster/socketcluster:v17.4.0
    platform: linux/amd64
    restart: unless-stopped
    ports:
      - "38000:8000"
    environment:
      SOCKETCLUSTER_WORKERS: 10
      SOCKETCLUSTER_BROKERS: 10
      SOCKETCLUSTER_OPTIONS: >-
        {"origins":"http://46.202.175.218:*"}

  scheduler:
    image: fleetbase/fleetbase-api:latest
    restart: unless-stopped
    command: ["go-crond", "--verbose", "root:./crontab"]
    volumes:
      - ./api/.env:/fleetbase/api/.env:ro
      - api_storage:/fleetbase/api/storage
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy

  queue:
    image: fleetbase/fleetbase-api:latest
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120"]
    volumes:
      - ./api/.env:/fleetbase/api/.env:ro
      - api_storage:/fleetbase/api/storage
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy

  application:
    image: fleetbase/fleetbase-api:latest
    restart: unless-stopped
    volumes:
      # IMPORTANT: this must exist as a FILE on the host
      - ./api/.env:/fleetbase/api/.env:ro
      - api_storage:/fleetbase/api/storage
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_healthy
      queue:
        condition: service_started
      socket:
        condition: service_started

  httpd:
    build:
      context: .
      dockerfile: docker/httpd/Dockerfile
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - application

  # No bind-mount -> avoids your "file vs directory" mount failure.
  console:
    image: fleetbase/fleetbase-console:latest
    restart: unless-stopped
    ports:
      - "4200:4200"
    environment:
      API_HOST: "http://46.202.175.218:8000"
      SOCKETCLUSTER_HOST: "http://46.202.175.218"
      SOCKETCLUSTER_PORT: "38000"
      SOCKETCLUSTER_PATH: "/"
      IS_SECURE: "false"
      APP_NAME: "Fleetbase"
    command:
      - /bin/sh
      - -lc
      - |
        cat > /usr/share/nginx/html/fleetbase.config.json <<EOF
        {
          "API_HOST": "${API_HOST}",
          "SOCKETCLUSTER_HOST": "${SOCKETCLUSTER_HOST}",
          "SOCKETCLUSTER_PORT": ${SOCKETCLUSTER_PORT},
          "SOCKETCLUSTER_PATH": "${SOCKETCLUSTER_PATH}",
          "IS_SECURE": ${IS_SECURE},
          "APP_NAME": "${APP_NAME}"
        }
        EOF
        exec nginx -g "daemon off;"
    depends_on:
      - httpd
      - socket

volumes:
  mysql_data:
  redis_data:
  api_storage:
